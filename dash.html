<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>تعبئة الكرش - لوحة الإدارة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #FCF9EC;
            --text: #1e2a41;
            --primary-1: #B0F4E6;
            --primary-2: #67EACA;
            --primary-3: #12D3CF;
            --card-bg: rgba(255, 255, 255, 0.7);
            --border-light: rgba(18, 211, 207, 0.3);
            --danger: #e53e3e;
            --success: #38a169;
        }
        body {
            font-family: 'Caveat', cursive;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle at 20% 30%, rgba(176, 244, 230, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(103, 234, 202, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        header {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px rgba(18, 211, 207, 0.1);
            flex-shrink: 0;
        }
        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-section img {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 8px -3px rgba(18, 211, 207, 0.3);
        }
        .logo-section h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text);
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 1rem;
            font-weight: 500;
            font-family: 'Caveat', cursive;
            color: var(--text);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(18, 211, 207, 0.1);
        }
        .back-btn:hover {
            background: rgba(176, 244, 230, 0.7);
            border-color: var(--primary-3);
            transform: translateY(-1px);
        }

        .grid-container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .section {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 8px 20px -8px rgba(18, 211, 207, 0.2);
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }
        .section::before {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary-1) 0%, var(--primary-2) 100%);
            border-radius: 50%;
            top: -30px;
            left: -30px;
            z-index: -1;
            opacity: 0.1;
            filter: blur(40px);
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 500;
            color: var(--text);
            border-bottom: 2px solid var(--primary-3);
            padding-bottom: 8px;
            margin-top: 0;
            margin-bottom: 15px;
            position: sticky;
            top: 0;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            z-index: 5;
        }

        /* كروت المستخدمين */
        .user-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            margin-bottom: 10px;
            transition: 0.2s;
        }
        .user-card:hover {
            background: rgba(176, 244, 230, 0.2);
            transform: translateY(-2px);
        }
        .user-card img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 2px 8px rgba(18, 211, 207, 0.2);
            object-fit: cover;
        }
        .user-info {
            flex: 1;
        }
        .user-info input {
            width: 100%;
            margin: 5px 0;
            padding: 8px 12px;
            background: white;
            backdrop-filter: blur(10px);
            border: 1px solid var(--primary-3);
            border-radius: 30px;
            font-family: 'Caveat', cursive;
            font-size: 0.9rem;
            color: var(--text);
            outline: none;
        }
        .user-info input:focus {
            border-color: var(--primary-3);
            box-shadow: 0 4px 12px rgba(18, 211, 207, 0.3);
        }
        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.6);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #4a5568;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* أزرار */
        .btn {
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            font-family: 'Caveat', cursive;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            backdrop-filter: blur(12px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .btn-save {
            background: white;
            border: 1px solid var(--success);
            color: var(--success);
        }
        .btn-save:hover {
            background: var(--success);
            color: white;
            transform: translateY(-1px);
        }
        .btn-delete {
            background: white;
            border: 1px solid var(--danger);
            color: var(--danger);
            margin-top: 10px;
            align-self: flex-start;
        }
        .btn-delete:hover {
            background: var(--danger);
            color: white;
            transform: translateY(-1px);
        }

        /* كروت المنشورات */
        .post-admin {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 12px;
        }
        .post-admin strong {
            font-size: 1.1rem;
        }
        .post-admin p {
            margin: 8px 0;
            font-size: 0.95rem;
        }
        .post-admin img, .post-admin video {
            max-width: 200px;
            border-radius: 20px;
            margin-top: 10px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 4px 12px rgba(18, 211, 207, 0.15);
        }

        /* تخصيص شريط التمرير */
        .section::-webkit-scrollbar {
            width: 6px;
        }
        .section::-webkit-scrollbar-track {
            background: rgba(176, 244, 230, 0.1);
            border-radius: 10px;
        }
        .section::-webkit-scrollbar-thumb {
            background: var(--primary-3);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-section">
            <img src="img.png" alt="شعار" onerror="this.style.display='none'">
            <h1>تعبئة الكرش</h1>
        </div>
        <a href="main.html" class="back-btn">↩️ العودة للساحة</a>
    </header>

    <div class="grid-container">
        <!-- قسم المستخدمين -->
        <div class="section">
            <h2>إدارة المستخدمين 👥</h2>
            <div id="usersList">جاري تحميل قائمة الأكيلة...</div>
        </div>

        <!-- قسم المنشورات -->
        <div class="section">
            <h2>إدارة المنشورات والميديا 📝</h2>
            <div id="postsList">جاري تحميل الساحة...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAlPKj6ecmEHHsipsD8YVD2Aq1hdiO9fpM",
            authDomain: "nexivo-a3ae4.firebaseapp.com",
            databaseURL: "https://nexivo-a3ae4-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "nexivo-a3ae4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase();

        // إعدادات Cloudinary
        const CLOUD_NAME = "dz7lsvlpe"; 

        // --- عرض وتحديث المستخدمين ---
        onValue(ref(db, 'users'), (snapshot) => {
            const users = snapshot.val();
            const container = document.getElementById('usersList');
            if (!users) { container.innerHTML = "لا يوجد مستخدمين حالياً."; return; }
            
            container.innerHTML = "";
            for (let id in users) {
                const u = users[id];
                container.innerHTML += `
                    <div class="user-card">
                        <img src="${u.photo || 'img.png'}" onerror="this.src='https://via.placeholder.com/60'">
                        <div class="user-info">
                            <input type="text" id="name-${id}" value="${u.username || ''}" placeholder="الاسم المستعار">
                            <input type="text" id="bio-${id}" value="${u.bio || ''}" placeholder="اكتب بيو جديد...">
                            <span class="badge">UID: ${id.substring(0,10)}...</span>
                        </div>
                        <button class="btn btn-save" onclick="window.updateUserData('${id}')">حفظ</button>
                    </div>
                `;
            }
        });

        window.updateUserData = (uid) => {
            const newName = document.getElementById(`name-${uid}`).value.trim();
            const newBio = document.getElementById(`bio-${uid}`).value.trim();
            
            if (!newName) {
                alert("الاسم لا يمكن أن يكون فارغاً");
                return;
            }

            update(ref(db, `users/${uid}`), { 
                username: newName, 
                bio: newBio 
            }).then(() => {
                alert("تم تحديث البيانات بنجاح! ✅");
            }).catch(err => alert("خطأ: " + err.message));
        };

        // --- عرض وحذف المنشورات مع الميديا ---
        onValue(ref(db, 'posts'), (snapshot) => {
            const posts = snapshot.val();
            const container = document.getElementById('postsList');
            if (!posts) { container.innerHTML = "الساحة فارغة تماماً."; return; }
            
            container.innerHTML = "";
            // تحويل الكائن إلى مصفوفة لترتيب المنشورات من الأحدث
            const sortedPosts = Object.keys(posts).reverse();

            sortedPosts.forEach(id => {
                const p = posts[id];
                let mediaHtml = "";
                if (p.image) mediaHtml = `<img src="${p.image}" class="post-img">`;
                else if (p.video) mediaHtml = `<video src="${p.video}" controls class="post-video"></video>`;
                else if (p.audio) mediaHtml = `<audio src="${p.audio}" controls class="audio-player"></audio>`;
                else if (p.mediaUrl) {
                    if (p.mediaType === 'image') mediaHtml = `<img src="${p.mediaUrl}" class="post-img">`;
                    else if (p.mediaType === 'video') mediaHtml = `<video src="${p.mediaUrl}" controls class="post-video"></video>`;
                    else if (p.mediaType === 'audio') mediaHtml = `<audio src="${p.mediaUrl}" controls class="audio-player"></audio>`;
                }
                
                container.innerHTML += `
                    <div class="post-admin">
                        <div>
                            <strong>${p.username || p.user_name || 'مستخدم'}</strong> 
                            <span class="badge">${p.timestamp ? new Date(p.timestamp).toLocaleString('ar-EG') : 'بدون تاريخ'}</span>
                            <p style="margin: 10px 0;">${p.content || p.text || ''}</p>
                            ${mediaHtml}
                        </div>
                        <button class="btn btn-delete" onclick="window.deleteFullPost('${id}', '${p.deleteToken || ''}')">
                            حذف نهائي 🗑️
                        </button>
                    </div>
                `;
            });
        });

        window.deleteFullPost = async (postId, deleteToken) => {
            if (!confirm("تحذير: هذا سيحذف المنشور من الموقع للأبد، ويحاول مسح الصورة من سيرفر كلوديناري. هل أنت متأكد؟")) return;

            try {
                // أ. محاولة الحذف من كلوديناري باستخدام التوكن
                if (deleteToken && deleteToken !== "undefined" && deleteToken !== "null") {
                    const formData = new FormData();
                    formData.append("token", deleteToken);
                    
                    await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/delete_by_token`, {
                        method: "POST",
                        body: formData
                    }).then(r => r.json()).then(res => console.log("نتيجة حذف كلوديناري:", res));
                }

                // ب. الحذف من Firebase
                await remove(ref(db, 'posts/' + postId));
                alert("تم حذف المنشور والميديا بنجاح! 🗑️✅");
                
            } catch (err) {
                console.error("خطأ أثناء الحذف:", err);
                // إذا فشل حذف كلوديناري، نحذف على الأقل من فايربيس
                await remove(ref(db, 'posts/' + postId));
                alert("تم حذف المنشور من الموقع (قد تبقى الصورة في سيرفر كلوديناري).");
            }
        };
    </script>
</body>
</html>
